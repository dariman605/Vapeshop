{% extends 'products/base.html' %}

{% block title %}Оформление заказа{% endblock %}

{% block content %}
<div class="checkout-wrapper">
    <div class="auth-form" style="max-width: 500px;">
        <h2>Оформление заказа</h2>
        <p style="color: var(--text-secondary); text-align: center; margin-bottom: 20px;">
            Сумма к оплате: <span style="color: var(--accent); font-weight: bold;">{{ total }} ₽</span>
        </p>

        <form method="post">
            {% csrf_token %}
            
            <div class="form-group">
                <label>Имя получателя</label>
                <input type="text" name="name" required placeholder="Иван Иванов">
            </div>
            
            <div class="form-group">
                <label>Адрес доставки</label>
                <input type="text" name="address" required placeholder="ул. Пушкина, д. 10">
            </div>
            
            <div class="form-group">
                <label>Номер карты (тестовый)</label>
                <input type="text" name="card" required placeholder="0000 0000 0000 0000" maxlength="19">
            </div>

            <button type="submit" class="auth-submit">Оплатить {{ total }} ₽</button>
        </form>
    </div>
</div>
{% endblock %}
