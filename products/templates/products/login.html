{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход</title>
    <link rel="stylesheet" href="{% static 'products/css/base.css' %}">
    <link rel="stylesheet" href="{% static 'products/css/components.css' %}">
</head>
<body>
    <div class="auth-page-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
        <div class="blob blob-4"></div>
        <div class="blob blob-5"></div>
    </div>

    <div class="auth-container">
        <div class="auth-form">
            <h2>С возвращением!</h2>
            
            {% if form.errors %}
                <div style="color: #ef4444; margin-bottom: 20px; font-size: 14px;">
                    <p>Неверное имя или пароль</p>
                </div>
            {% endif %}

            <form method="post">
                {% csrf_token %}
                
                <div class="form-group">
                    <label>Имя пользователя</label>
                    {{ form.username }}
                </div>
                
                <div class="form-group">
                    <label>Пароль</label>
                    {{ form.password }}
                </div>

                <button type="submit" class="auth-submit">Войти</button>
            </form>
            
            <div class="auth-link">
                Нет аккаунта? <a href="{% url 'register' %}">Зарегистрироваться</a>
            </div>
        </div>
    </div>
</body>
</html>
